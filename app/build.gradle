apply plugin: 'com.android.application'

android {
    compileSdk 35
    namespace "com.cointhink.cmc"

    defaultConfig {
        applicationId "com.cointhink.cmc"
        versionCode 48
        versionName "0.98"
        minSdkVersion 26
        targetSdkVersion 35
    }
    dependencies {
        //implementation "androidx.appcompat:appcompat:1.1.0"
        implementation "androidx.viewpager:viewpager:1.0.0"
        implementation "androidx.preference:preference:1.1.0"
    }
    buildFeatures {
        aidl true
    }
    buildTypes {
        release {
            minifyEnabled false
        }
    }
    buildToolsVersion '37.0.0'
}
